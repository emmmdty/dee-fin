[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sarge"
version = "0.1.0"
description = "Schema-Aware Role-Grounded Extractor for Chinese Financial Document-Level Event Extraction"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "TJK" }]
keywords = ["dee", "event-extraction", "chinese-finance", "llm", "schema-aware"]

dependencies = [
    "httpx>=0.28",
    "jsonschema>=4.20.0",
    "openai>=2.0",
    "PyYAML>=6.0.1",
    "python-dotenv>=1.0",
    "numpy>=1.26",
    "scipy>=1.11",
]

[project.optional-dependencies]
server = [
    "torch>=2.2",
    "transformers>=4.51.0",
    "peft>=0.11.0",
    "accelerate>=0.33.0",
    "bitsandbytes>=0.43.0",
    "scikit-learn>=1.4",
]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["sarge*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-ra -q"
