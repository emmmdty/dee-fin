# Feasibility smoke: zero-shot LLM extractor + grounding + consistency on a
# few MAVEN docs. Local model path (HF offline), shorter generations.
# NOT a research config — for chapter-2 link verification only.
relations:
  extractor: llm
  extractor_kwargs:
    model_name: Qwen/Qwen3-4B-Instruct-2507
    adapter_path: null
    max_new_tokens: 512
    device: cuda
  require_evidence: true
  consistency: greedy
  consistency_kwargs:
    close_temporal: true

data:
  loader: maven_ere
  path: data/processed/maven_ere/valid_smoke.jsonl
