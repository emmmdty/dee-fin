# Feasibility smoke: GRPO-RLVR with the composite verifiable reward, tiny.
# Fresh LoRA (no SFT dependency), hf rollout (no vllm needed), a handful of
# steps. NOT a research config — for chapter-2 RL link verification only.
relations_rl:
  base_model: Qwen/Qwen3-4B-Instruct-2507
  sft_adapter_path: null            # fresh LoRA for the smoke
  lora:
    r: 8
    alpha: 16
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj]

  rewards:
    - {name: format, weight: 0.1}
    - {name: grounding, weight: 0.3, kwargs: {max_quote_chars: 60}}
    - {name: consistency, weight: 0.2}
    - {name: task_f1, weight: 0.4}

  curriculum:
    window_events: 8
    phases:
      - {max_difficulty: 8, steps: 4}

  grpo:
    num_generations: 4
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 1
    learning_rate: 1.0e-5
    beta: 0.0                        # skip the KL ref-model forward for the smoke
    temperature: 0.9
    top_p: 0.95
    max_prompt_length: 1024
    max_completion_length: 256
    bf16: true
    gradient_checkpointing: true
    max_grad_norm: 0.5
    seed: 42

  rollout:
    backend: hf                      # transformers generate; no vllm coupling

data:
  loader: maven_ere
  path: data/processed/maven_ere/train_smoke.jsonl
