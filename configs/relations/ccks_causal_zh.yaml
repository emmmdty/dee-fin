# Chinese financial grounding: CCKS financial event-causality.
# Same method, Chinese domain data (no new annotation).
relations:
  extractor: llm
  extractor_kwargs:
    model_name: Qwen/Qwen3-4B-Instruct-2507
    adapter_path: null
    max_new_tokens: 1024
    device: cuda
  require_evidence: true
  consistency: greedy
  consistency_kwargs:
    close_temporal: true

data:
  loader: ccks_causal
  path: data/processed/ccks_fin_causal/test.jsonl
