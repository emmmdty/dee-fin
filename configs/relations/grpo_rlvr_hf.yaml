# Relation GRPO-RLVR — hf-rollout variant of grpo_rlvr.yaml.
# Used when NCCL is unusable on the box (here: a faulted GPU breaks NCCL's NVML
# topology enumeration, killing both the vllm_server weight-sync group AND
# accelerate's colocate barrier). The `hf` backend uses transformers .generate()
# for rollouts: no vLLM worker, no RANK/distributed env, accelerate stays
# single-process non-distributed -> NO NCCL anywhere -> never touches the bad card.
# Slower generation than vLLM, but robust. Same reward/curriculum/grpo knobs.
relations_rl:
  base_model: Qwen/Qwen3-4B-Instruct-2507
  sft_adapter_path: runs/relation_extractor_lora
  lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules: [q_proj, k_proj, v_proj, o_proj]

  rewards:
    - {name: format, weight: 0.1}
    - {name: grounding, weight: 0.3, kwargs: {max_quote_chars: 60}}
    - {name: consistency, weight: 0.2}
    - {name: task_f1, weight: 0.4}

  curriculum:
    window_events: 24
    phases:
      - {max_difficulty: 6, steps: 200}
      - {max_difficulty: 12, steps: 300}
      - {max_difficulty: 24, steps: 300}

  grpo:
    num_generations: 8
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 16
    learning_rate: 1.0e-5
    beta: 0.01
    epsilon: 0.2
    temperature: 0.9
    top_p: 0.95
    max_prompt_length: 1536
    max_completion_length: 768
    bf16: true
    gradient_checkpointing: true
    max_grad_norm: 0.5
    seed: 42

  rollout:
    backend: hf                       # transformers .generate(); no vLLM, no NCCL

data:
  loader: maven_ere
  path: data/processed/maven_ere/train.jsonl
